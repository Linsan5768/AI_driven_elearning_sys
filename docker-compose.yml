services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: magic-academy-backend
    ports:
      - "8001:8001"
    volumes:
      # Use named volumes instead of bind mounts for data persistence
      # This allows data to persist even if local directories are deleted
      # Note: Volume names must match those defined in the 'volumes:' section below
      - backend_uploads:/app/uploads
      - backend_courses:/app/courses
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - PORT=8001
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - magic-academy-network
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/game-state"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8001/api
    container_name: magic-academy-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - ollama
    restart: unless-stopped
    networks:
      - magic-academy-network

  # Ollama service - enabled for LLM features
  ollama:
    image: ollama/ollama:latest
    container_name: magic-academy-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - magic-academy-network

networks:
  magic-academy-network:
    driver: bridge

volumes:
  ollama_data:
  backend_uploads:
    # Named volume for backend uploads - persists data independently of local filesystem
  backend_courses:
    # Named volume for backend courses - persists data independently of local filesystem

